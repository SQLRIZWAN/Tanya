<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tanayaa... Yeh Dil Ki Baat Hai ♡</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9ec1, #d7aefb, #ffccdd);
      color: #333;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    .container {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 5.5rem;
      color: #fff;
      text-shadow: 0 0 20px #ff4081, 0 0 40px #c2185b;
      margin: 40px 0 20px;
    }
    .username {
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 0 15px #7b1fa2;
      margin-bottom: 30px;
    }
    .msg {
      font-size: 1.5rem;
      line-height: 1.8;
      color: #fff;
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
      max-width: 700px;
      margin: 0 auto 50px;
    }
    .question {
      font-size: 3.2rem;
      color: #fff;
      text-shadow: 0 0 25px #e91e63;
      margin: 80px 0 60px;
      font-weight: 700;
    }
    .yes-btn {
      padding: 25px 120px;
      font-size: 2.8rem;
      font-weight: bold;
      background: linear-gradient(45deg, #ff4081, #f50057);
      color: white;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      box-shadow: 0 15px 40px rgba(255,64,129,0.7);
      transition: all 0.4s ease;
    }
    .yes-btn:hover {
      transform: scale(1.2) rotate(5deg);
      box-shadow: 0 25px 60px rgba(245,0,87,0.9);
    }
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .heart {
      position: absolute;
      font-size: 50px;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 0 10px #ff4081;
      animation: floatHeart 12s linear infinite;
      user-select: none;
    }
    @keyframes floatHeart {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-150px) rotate(720deg); opacity: 0; }
    }
    @media (max-width: 600px) {
      h1 { font-size: 4rem; }
      .question { font-size: 2.5rem; }
      .yes-btn { padding: 20px 80px; font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="container">
    <h1>Heyy Tanayaa ♡</h1>
    <div class="username">@miss__Tanayaya__90</div>

    <p class="msg">
      Teri har baat, har smile dil ko chhoo jati hai... <br><br>
      Bahut time se yeh feeling andar thi, ab mann ki baat bol deta hoon. <br>
      Tu meri zindagi mein itni khushi laati hai ki...
    </p>

    <div class="question">Kya tu meri girlfriend banegi? 🥺❤️</div>

    <button class="yes-btn" onclick="yesMagic()">YES!! 😍❤️</button>
  </div>

  <script>
    // Floating cute hearts (bohot pyare animation)
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = Math.random() > 0.6 ? "❤️" : "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 8 + 10) + "s";
      heart.style.fontSize = (Math.random() * 40 + 30) + "px";
      document.getElementById("hearts").appendChild(heart);
      setTimeout(() => heart.remove(), 18000);
    }
    setInterval(createHeart, 300); // Har 0.3 second mein naya heart

    function yesMagic() {
      alert("Yayyyy!!! 😍❤️ Dil garden-garden ho gaya ab toh! Jaldi reply de na, bohot baatein karni hain 🥰✨");
      
      // Extra sparkles/confetti for fun
      for (let i = 0; i < 100; i++) {
        setTimeout(() => {
          const spark = document.createElement("div");
          spark.style.position = "fixed";
          spark.style.width = "10px";
          spark.style.height = "10px";
          spark.style.background = `hsl(${Math.random()*360}, 100%, 70%)`;
          spark.style.left = Math.random()*100 + "vw";
          spark.style.top = "-20px";
          spark.style.borderRadius = "50%";
          spark.style.pointerEvents = "none";
          spark.style.animation = "sparkFall 4s linear";
          document.body.appendChild(spark);
          setTimeout(() => spark.remove(), 5000);
        }, i * 50);
      }
    }
  </script>

  <style>
    @keyframes sparkFall {
      to { transform: translateY(120vh) rotate(1080deg); opacity: 0; }
    }
  </style>

</body>
</html>
